# Публикация в ветку gh-pages (не требует режима «GitHub Actions» в Settings → Pages).
# После первого успешного прогона: Settings → Pages → Source: Deploy from a branch → gh-pages / (root)

name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install and build
        env:
          VITE_BASE_PATH: /Shifr-serdca/
        run: |
          npm ci
          npm run build

      - name: Push dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
